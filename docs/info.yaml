game_info:
  name: "小团快跑"
  total_steps: 32
  win_condition: "抵达第32步"
  core_mechanics:
    movement: "行动顺序和移动点数分开掷骰，所有团子只能投出1到3的点数，但是布大王可以投出1到6的点数。每轮先掷骰决定本回合行动顺序，然后在各自回合掷骰决定前进步数。"
    stacking: "移动结束时，若终点格已有其他团子，则置于堆叠最上方；移动时，若上方有其他团子，带着它们一起移动。首轮移动时，不考虑堆叠，所有团子从第0格出发，上方视为不堆叠任何团子。"
    skill_trigger: "每轮行动时有概率发动特有技能"
    grouping: "config.json中的json数组记录了分组信息，通过启动参数指定，每次运行都必须在启动参数中显式指定分组。每个元素在json数组中的索引即为分组号，每个元素中有两个键值对，有“出场团子”键和“上一轮结束时的位置信息”键，布大王是否出场也要写在出场团子中，每轮比赛结束后，布大王自动消失，不记录在上一轮结束时的位置信息中"

tuanzi_characters:
  - name: "陆·赫斯团子"
    skill: "强化装置效果：触发【推进装置】额外前进3格；触发【阻遏装置】额外后退1格"

  - name: "西格莉卡团子"
    skill: "干扰排名：每轮投骰后，标记排名紧邻自身且更高的至多两个团子。被标记对象本回合少前进1格（移动距离不低于1）。首轮时不视为任何团子堆叠在上方"

  - name: "达妮娅团子"
    skill: "连续性奖励：若投出与上一次相同的点数，额外前进2格"

  - name: "绯雪团子"
    skill: "奇遇增益：与【布大王】相遇后，后续每次移动额外前进1格"

  - name: "卡提希娅团子"
    skill: "绝境逆袭：每场限1次。移动结束若处于最后一名，则后续回合全都60%概率额外前进2格"

  - name: "菲比团子"
    skill: "概率冲刺：50%概率额外前进1格"

  - name: "千咲团子"
    skill: "投骰子时，若投出的结果为本轮所有点数最小之一，则额外前进2格。"

  - name: "莫宁团子"
    skill: "投骰子时，点数将固定按3/2/1的顺序循环出现。"

  - name: "琳奈团子"
    skill: "每回合中，有60%概率按照双倍点数移动，但有20%概率当回合无法移动。"

  - name: "爱弥斯团子"
    skill: "每场比赛一次，当该团子经过赛程中点后，若前方存在其他非布大王的团子，则会传送到前方离自己最近的团子顶端。"

  - name: "守岸人团子"
    skill: "骰子只会掷出2或3。"

  - name: "珂莱塔团子"
    skill: "28%概率以骰子的双倍点数前进。"

special_entities:
  - name: "布大王团子"
    behavior:
      start_turn: 3
      direction: "从终点向起点移动"
      dice_range: [1, 6]
      stacking_rule: "行动前不参与团子之间的堆叠排序。行动后一定处于堆叠底部。"
      mechanics: "行动时会受到赛道内机制影响。若整轮行动结束后，与最后一名团子分开，则传送回终点，终点成为新起点"

map_mechanics:
  - name: "推进装置"
    effect: "终点为该格时，向前移动1格"
    positions: [3, 11, 16, 23]

  - name: "阻遏装置"
    effect: "终点为该格时，向后移动1格"
    positions: [10, 28]

  - name: "时空裂隙"
    effect: "终点为该格时，吞噬团子并使其从上方掉落，随机重组堆叠顺序"
    positions: [6, 20]

simulation_task:
  goal: "设计程序模拟10,000次比赛"
  output: "计算并列出每个团子的获胜概率"
